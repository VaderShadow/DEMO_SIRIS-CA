<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIRIS-CA — Sistema Regional de Inteligencia de Riesgos y Situaciones</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link
rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>
<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="../css/layout.css">
</head>

<body>

<div class="app">

    <div id="navbar-container"></div>

    <div id="sidebar-container"></div>

    <main class="main-content">

        <div id="dashboard-content">

<!-- HEADER -->
<div class="header">
    <div class="logo-box">
        <div class="logo-icon">SIRIS<br>CA</div>

        <div class="logo-text">
            <h1>SIRIS-CA <span>v2.0 DEMO</span></h1>
            <p>Sistema Regional de Inteligencia de Riesgos y Situaciones • CEPREDENAC</p>
        </div>
    </div>

    <div class="header-right">

        <div class="status-dot">
            <div class="dot"></div>
            EN LÍNEA
        </div>

        <div class="clock">
            <div class="time" id="clock-time">--:--:--</div>
            <div class="date" id="clock-date">Cargando...</div>
        </div>

        <div class="user-badge">

            <div class="avatar">
                AN
            </div>

            <div>

                <div style="font-weight:600;">
                    Analista Regional
                </div>

                <div style="font-size:8px;color:var(--text-muted);">
                    CEPREDENAC
                </div>

            </div>

        </div>

    </div>

</div>

<!-- DETAIL MODAL -->

<div class="modal-overlay" id="detailModal">

    <div class="modal" style="position:relative;">

        <button class="modal-close" onclick="closeModal()">
            ×
        </button>

        <div id="modalContent"></div>

    </div>

</div>

</div>

</main>

</div>

<script src="../js/data.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/app.js"></script>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="../js/map.js"></script>
</body>

</html>

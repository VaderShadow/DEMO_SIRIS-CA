<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SIRIS-CA | Sistema Regional de Inteligencia de Riesgos y Situaciones</title>

    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <!-- Leaflet -->
    <link rel="stylesheet"
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <!-- CSS -->
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/layout.css">

</head>

<body>

<div class="app">

    <!-- NAVBAR -->
    <div id="navbar-container"></div>

    <!-- SIDEBAR -->
    <div id="sidebar-container"></div>

    <!-- CONTENIDO -->
    <main class="main-content">

        <!-- ========================= -->
        <!-- HEADER -->
        <!-- ========================= -->

        <section class="dashboard-header">

            <div class="header-left">

                <div class="logo-box">

                    <div class="logo-icon">
                        SIRIS<br>CA
                    </div>

                    <div class="logo-text">

                        <h1>
                            SIRIS-CA
                            <span>v2.0</span>
                        </h1>

                        <p>
                            Sistema Regional de Inteligencia de Riesgos y Situaciones
                        </p>

                    </div>

                </div>

            </div>

            <div class="header-right">

                <div class="status-online">

                    <span class="status-dot"></span>

                    Sistema Operativo

                </div>

                <div class="clock-box">

                    <div id="clock-time">

                        --:--:--

                    </div>

                    <div id="clock-date">

                        Cargando...

                    </div>

                </div>

                <div class="user-box">

                    <div class="avatar">

                        AN

                    </div>

                    <div>

                        <strong>
                            Analista Regional
                        </strong>

                        <br>

                        CEPREDENAC

                    </div>

                </div>

            </div>

        </section>

        <!-- ========================= -->
        <!-- AQUÍ COMIENZA EL DASHBOARD -->
        <!-- ========================= -->

        <section id="dashboard-container">
            <div id="header-container"></div>

        <div id="metrics-container"></div>

        <div id="map-container"></div>

        <div id="events-container"></div>

        <div id="ai-container"></div>

        <div id="footer-container"></div>
        </section>

    </main>

</div>

<!-- ========================= -->
<!-- MODAL -->
<!-- ========================= -->

<div class="modal-overlay" id="detailModal">

    <div class="modal">

        <button class="modal-close"
                onclick="closeModal()">

            ×

        </button>

        <div id="modalContent"></div>

    </div>

</div>

<!-- Leaflet -->

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- JS -->

<script src="../js/data.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/map.js"></script>
<script src="../js/layerManager.js"></script>
<script src="../js/dashboard.js"></script>
<script src="../js/app.js"></script>

</body>

</html>
